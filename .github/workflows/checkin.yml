name: 每日自动签到

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    name: 雨云签到
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Google Chrome 和 Xvfb
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get -f install -y
          sudo apt-get install -y xvfb
          echo "CHROME_BIN=/usr/bin/google-chrome-stable" >> "$GITHUB_ENV"

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install undetected-chromedriver

      - name: 修复 pages.py
        run: |
          python3 -c "
          with open('rainyun/browser/pages.py','r') as f: c=f.read()
          c=c.replace('EC.element_to_be_clickable((By.XPATH, XPATH_CONFIG[\"SIGN_IN_BTN\"]))','EC.presence_of_element_located((By.XPATH, XPATH_CONFIG[\"SIGN_IN_BTN\"]))')
          with open('rainyun/browser/pages.py','w') as f: f.write(c)
          print('OK: patched pages.py')
          "

      - name: 生成签到脚本
        run: |
          cat > checkin.py << 'SCRIPT'
          import os, sys, logging
          sys.path.insert(0, os.path.dirname(os.path.abspath(__file__)))

          import undetected_chromedriver as uc
          from rainyun.browser.session import BrowserSession

          def _patched_init_selenium(self):
              import subprocess
              v = subprocess.check_output(["google-chrome-stable","--version"],text=True).strip()
              major = int(v.split()[-1].split(".")[0])
              driver = uc.Chrome(version_main=major)
              driver.set_window_size(1920, 1080)
              return driver

          BrowserSession._init_selenium = _patched_init_selenium

          from rainyun.config import Config
          from rainyun.main import run_with_config

          def main():
              logging.basicConfig(level=logging.INFO, format="%(asctime)s - %(levelname)s - %(message)s")
              user = os.environ.get("RAINYUN_USER", "")
              pwd = os.environ.get("RAINYUN_PWD", "")
              api_key = os.environ.get("RAINYUN_API_KEY", "")
              if not user or not pwd:
                  logging.error("RAINYUN_USER and RAINYUN_PWD are required")
                  return 1
              config = Config.from_env(os.environ)
              config = config.__class__(**{**config.__dict__, "rainyun_user": user, "rainyun_pwd": pwd, "rainyun_api_key": api_key, "linux_mode": True, "max_delay": int(os.environ.get("MAX_DELAY", "0")), "cookie_file": "data/cookies/cookies_github.json"})
              cookie_dir = os.path.dirname(config.cookie_file)
              if cookie_dir:
                  os.makedirs(cookie_dir, exist_ok=True)
              os.makedirs("data", exist_ok=True)
              os.makedirs("temp", exist_ok=True)
              logging.info("===== Rainyun Checkin (GitHub Actions) =====")
              success = run_with_config(config)
              logging.info("===== Result: %s =====", "SUCCESS" if success else "FAILED")
              return 0 if success else 1
          if __name__ == "__main__":
              sys.exit(main())
          SCRIPT

      - name: 执行签到
        env:
          RAINYUN_USER: ${{ secrets.RAINYUN_USER }}
          RAINYUN_PWD: ${{ secrets.RAINYUN_PWD }}
          RAINYUN_API_KEY: ${{ secrets.RAINYUN_API_KEY }}
          LINUX_MODE: true
          MAX_DELAY: 0
          DISPLAY: ":99"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python checkin.py
