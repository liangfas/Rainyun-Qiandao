name: 每日自动签到

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    name: 雨云签到
    runs-on: ubuntu-latest

    steps:
      - name: 执行签到
        run: |
          python3 -c "
          import requests, json, os
          from datetime import datetime

          api_key = os.environ.get('RAINYUN_API_KEY', '')
          if not api_key:
              print('ERROR: RAINYUN_API_KEY is not set')
              exit(1)

          headers = {
              'Content-Type': 'application/json',
              'X-Api-Key': api_key
          }
          base = 'https://api.v2.rainyun.com'

          # 签到前积分
          info = requests.get(f'{base}/user/', headers=headers).json()
          before = info.get('data', {}).get('Points', 0)
          print(f'[{datetime.now()}] 签到前积分: {before}')

          # 执行签到
          result = requests.post(
              f'{base}/user/reward/tasks',
              headers=headers,
              data=json.dumps({'task_name': '每日签到'})
          ).json()
          code = result.get('code', -1)
          msg = result.get('message', '')
          print(f'[{datetime.now()}] 签到结果: code={code}, message={msg}')

          if code == 200:
              print('签到成功！')
          elif code == 30011:
              print('今日已签到过')
          else:
              print(f'签到失败: {msg}')
              exit(1)

          # 签到后积分
          info2 = requests.get(f'{base}/user/', headers=headers).json()
          after = info2.get('data', {}).get('Points', 0)
          earned = after - before
          print(f'[{datetime.now()}] 签到后积分: {after} (本次 +{earned})')
          "
        env:
          RAINYUN_API_KEY: ${{ secrets.RAINYUN_API_KEY }}
