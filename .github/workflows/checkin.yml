name: 每日自动签到

on:
    # 定时触发：每天北京时间 8:00（UTC 0:00）
    schedule:
      - cron: '0 0 * * *'
    # 支持手动触发，方便测试
    workflow_dispatch:

jobs:
    checkin:
      name: 雨云签到
      runs-on: ubuntu-latest

      steps:
        - name: Checkout 代码
          uses: actions/checkout@v4

        - name: 安装 Chromium 和 chromedriver
          run: |
            sudo apt-get update
            sudo apt-get install -y chromium-browser chromium-chromedriver
            echo "CHROME_BIN=/usr/bin/chromium-browser" >> "$GITHUB_ENV"
            echo "CHROMEDRIVER_PATH=/usr/lib/chromium-browser/chromedriver" >> "$GITHUB_ENV"

        - name: 设置 Python 3.11
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: 安装 Python 依赖
          run: |
            pip install --upgrade pip setuptools wheel
            pip install -r requirements.txt

        - name: 执行签到
          env:
            RAINYUN_USER: ${{ secrets.RAINYUN_USER }}
            RAINYUN_PWD: ${{ secrets.RAINYUN_PWD }}
            RAINYUN_API_KEY: ${{ secrets.RAINYUN_API_KEY }}
            LINUX_MODE: true
            MAX_DELAY: 0
          run: python checkin.py
