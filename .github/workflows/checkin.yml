name: 每日自动签到

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    name: 雨云签到
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 恢复原始文件并打补丁
        run: |
          git checkout HEAD -- rainyun/browser/session.py rainyun/browser/pages.py

          python3 << 'PATCH'
          # 1) pages.py: 放宽按钮等待条件
          p1 = 'rainyun/browser/pages.py'
          with open(p1, 'r') as f:
              c1 = f.read()
          c1 = c1.replace(
              'EC.element_to_be_clickable((By.XPATH, XPATH_CONFIG["SIGN_IN_BTN"]))',
              'EC.presence_of_element_located((By.XPATH, XPATH_CONFIG["SIGN_IN_BTN"]))'
          )
          with open(p1, 'w') as f:
              f.write(c1)
          print('OK: patched pages.py')

          # 2) session.py: 替换 --headless 为新版模式 + 添加反检测参数
          p2 = 'rainyun/browser/session.py'
          with open(p2, 'r') as f:
              lines = f.readlines()
          new_lines = []
          done = False
          for line in lines:
              # 关键: 旧版 --headless 会被验证码检测，换成 --headless=new
              if line.strip() == 'ops.add_argument("--headless")':
                  sp = ' ' * (len(line) - len(line.lstrip()))
                  line = sp + 'ops.add_argument("--headless=new")\n'
              new_lines.append(line)
              if not done and '--disable-dev-shm-usage' in line:
                  sp = ' ' * (len(line) - len(line.lstrip()))
                  new_lines.append(sp + 'ops.add_argument("--window-size=1920,1080")\n')
                  new_lines.append(sp + 'ops.add_argument("--disable-blink-features=AutomationControlled")\n')
                  new_lines.append(sp + 'ops.add_experimental_option("excludeSwitches", ["enable-automation"])\n')
                  new_lines.append(sp + 'ops.add_experimental_option("useAutomationExtension", False)\n')
                  new_lines.append(sp + 'ops.add_argument("--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36")\n')
                  done = True
          with open(p2, 'w') as f:
              f.writelines(new_lines)
          print('OK: patched session.py')
          PATCH

      - name: 安装 Chromium 和 chromedriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          echo "CHROME_BIN=/usr/bin/chromium-browser" >> "$GITHUB_ENV"
          echo "CHROMEDRIVER_PATH=/usr/lib/chromium-browser/chromedriver" >> "$GITHUB_ENV"

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: 生成签到脚本
        run: |
          cat > checkin.py << 'SCRIPT'
          import os, sys, logging
          sys.path.insert(0, os.path.dirname(os.path.abspath(__file__)))
          from rainyun.config import Config
          from rainyun.main import run_with_config
          def main():
              logging.basicConfig(level=logging.INFO, format="%(asctime)s - %(levelname)s - %(message)s")
              user = os.environ.get("RAINYUN_USER", "")
              pwd = os.environ.get("RAINYUN_PWD", "")
              api_key = os.environ.get("RAINYUN_API_KEY", "")
              if not user or not pwd:
                  logging.error("RAINYUN_USER and RAINYUN_PWD are required")
                  return 1
              config = Config.from_env(os.environ)
              config = config.__class__(**{**config.__dict__, "rainyun_user": user, "rainyun_pwd": pwd, "rainyun_api_key": api_key, "linux_mode": True, "max_delay": int(os.environ.get("MAX_DELAY", "0")), "cookie_file": "data/cookies/cookies_github.json"})
              cookie_dir = os.path.dirname(config.cookie_file)
              if cookie_dir:
                  os.makedirs(cookie_dir, exist_ok=True)
              os.makedirs("data", exist_ok=True)
              os.makedirs("temp", exist_ok=True)
              logging.info("===== Rainyun Checkin (GitHub Actions) =====")
              success = run_with_config(config)
              logging.info("===== Result: %s =====", "SUCCESS" if success else "FAILED")
              return 0 if success else 1
          if __name__ == "__main__":
              sys.exit(main())
          SCRIPT

      - name: 执行签到
        env:
          RAINYUN_USER: ${{ secrets.RAINYUN_USER }}
          RAINYUN_PWD: ${{ secrets.RAINYUN_PWD }}
          RAINYUN_API_KEY: ${{ secrets.RAINYUN_API_KEY }}
          LINUX_MODE: true
          MAX_DELAY: 0
        run: python checkin.py
